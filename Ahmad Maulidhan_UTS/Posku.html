<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POSKu Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="logo">POSKu</div>
        <div class="user">👤 Admin</div>
    </header>

    <main class="container">

        <h2>Selamat Datang di POSKu</h2>
        <p>Kelola bisnis Anda dengan mudah dan cepat.</p>

        <div class="menu-grid">

            <div class="card">
                <div class="icon">🛒</div>
                <h3>Transaksi</h3>
            </div>

            <div class="card">
                <div class="icon">📦</div>
                <h3>Produk</h3>
            </div>

            <div class="card">
                <div class="icon">🔍</div>
                <h3>Pengecekan Barang</h3>
            </div>

            <div class="card">
                <div class="icon">📈</div>
                <h3>Omset & Keuntungan</h3>
            </div>

            <div class="card">
                <div class="icon">📄</div>
                <h3>Laporan</h3>
            </div>

            <div class="card">
                <div class="icon">⚙️</div>
                <h3>Pengaturan</h3>
            </div>

        </div>

    </main>

</body>

</html>
